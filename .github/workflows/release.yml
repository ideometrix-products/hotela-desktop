name: Build & Release Hotela Desktop

# ONLY triggered when you push a version tag like: git tag v1.0.0 && git push --tags
on:
  push:
    tags:
      - 'v*.*.*'

# Required so GITHUB_TOKEN can create Releases and upload assets
permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - name: Checkout hotela-desktop
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # --- CLONE AND BUILD THE WEB APP ---
      # This replaces running `npm run sync` manually.
      # GitHub clones hotela-app, builds it, and copies the output here.
      - name: Clone hotela-app
        uses: actions/checkout@v4
        with:
          repository: ideometrix-products/hotela-app
          path: hotela-app-source
          ref: develop
          token: ${{ secrets.GH_PAT }}

      - name: Install hotela-app dependencies
        run: npm ci
        working-directory: hotela-app-source

      - name: Build hotela-app web bundle
        run: npm run build
        working-directory: hotela-app-source
        env:
          VITE_API_URL: https://api.hotelaapp.com/api

      - name: Copy web build into desktop folder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build
          Copy-Item -Recurse -Force hotela-app-source/build/* build/
          # Inject ESM marker — matches exactly what sync-web-build.js does locally
          Set-Content -Path "build/server/package.json" -Value '{"type":"module"}'

      # --- BUILD THE WINDOWS INSTALLER ---
      - name: Install hotela-desktop dependencies
        run: npm install --legacy-peer-deps

      - name: Build Windows installer
        run: npm run dist -- --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist-package/*.exe
          if-no-files-found: error

  build-mac:
    name: Build macOS Installer
    runs-on: macos-latest

    steps:
      - name: Checkout hotela-desktop
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # --- CLONE AND BUILD THE WEB APP ---
      - name: Clone hotela-app
        uses: actions/checkout@v4
        with:
          repository: ideometrix-products/hotela-app
          path: hotela-app-source
          ref: develop
          token: ${{ secrets.GH_PAT }}

      - name: Install hotela-app dependencies
        run: npm ci
        working-directory: hotela-app-source

      - name: Build hotela-app web bundle
        run: npm run build
        working-directory: hotela-app-source
        env:
          VITE_API_URL: https://api.hotelaapp.com/api

      - name: Copy web build into desktop folder
        run: |
          mkdir -p build
          cp -r hotela-app-source/build/* build/
          # Inject ESM marker — matches exactly what sync-web-build.js does locally
          echo '{"type":"module"}' > build/server/package.json

      # --- BUILD THE MAC INSTALLER ---
      - name: Install hotela-desktop dependencies
        run: npm install --legacy-peer-deps

      - name: Build macOS installer (unsigned)
        run: npm run dist -- --mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: dist-package/*.dmg
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: ./installers

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: mac-installer
          path: ./installers

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Hotela Desktop ${{ github.ref_name }}
          body: |
            ## Hotela Desktop ${{ github.ref_name }}

            ### Download
            - **Windows**: Download the `.exe` file and run it to install
            - **macOS**: Download the `.dmg` file, open it, and drag Hotela to your Applications folder
              > ⚠️ On Mac you may need to go to **System Preferences → Security & Privacy** and click "Open Anyway"

            ### Auto-Update
            If you already have Hotela Desktop installed, it will update automatically in the background.
          files: ./installers/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
