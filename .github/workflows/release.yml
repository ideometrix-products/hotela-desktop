name: Build & Release Hotela Desktop

# ONLY triggered when you push a version tag like: git tag v1.0.0 && git push --tags
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run dist -- --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist-package/*.exe
          if-no-files-found: error

  build-mac:
    name: Build macOS Installer
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build macOS installer (unsigned - no Apple cert required)
        run: npm run dist -- --mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Skip code signing - users will need to allow app in Security settings
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: dist-package/*.dmg
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: ./installers

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: mac-installer
          path: ./installers

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Hotela Desktop ${{ github.ref_name }}
          body: |
            ## Hotela Desktop ${{ github.ref_name }}

            ### Download
            - **Windows**: Download the `.exe` file below and run it to install
            - **macOS**: Download the `.dmg` file, open it, and drag Hotela to Applications
              > ⚠️ On Mac, go to **System Preferences → Security & Privacy** and click "Open Anyway" if prompted

            ### What's New
            See the commit history for changes included in this release.
          files: ./installers/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
